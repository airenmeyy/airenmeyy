name: dragon-devours-contributions

on:
  schedule:
    # loops forever — regenerates every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  feed-the-dragon:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: generate dragon svg from contribution graph
        uses: Platane/snk@v3
        id: dragon
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/dragon.svg?color_snake=%23D4AF37,%236B4E71,%233B5240&color_dots=%231A1225,%232C263F,%233B5240,%236B4E71,%23D4AF37&color_empty=%230B0B12
          # ↑ gothic dark palette: void black -> deep purple -> forest -> plum -> gold
          # this renders as a serpentine creature devouring your contribution squares

      - name: push dragon svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
