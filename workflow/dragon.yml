name: Generate Ouroboros Animation

on:
  schedule:
    # Berjalan otomatis setiap jam 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Output SVG dengan warna custom ala Renaissance Goth! (Naga Emas, kotak gelap/ungu/hijau)
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#D4AF37&color_dots=#0B0B12,#1A1225,#3B5240,#6B4E71,#C9A0DC
          
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
